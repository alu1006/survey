<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體驗滿意度問卷</title>
    <!-- 引入 Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient-start: #fce7f3;
            --bg-gradient-end: #e0e7ff;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-border: rgba(255, 255, 255, 0.5);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            padding: 2rem 1rem;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -15px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: #374151;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .rating-group {
            display: flex;
            gap: 1.5rem;
            justify-content: space-between;
            margin-top: 0.5rem;
        }

        .rating-item {
            flex: 1;
            position: relative;
        }

        .rating-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .rating-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 0.5rem;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rating-item input:checked + .rating-label {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1);
            transform: scale(1.05);
        }

        .rating-item:hover .rating-label {
            background: rgba(255, 255, 255, 0.9);
        }

        .emoji {
            font-size: 1.75rem;
        }

        .rating-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .rating-item input:checked + .rating-label .rating-text {
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 成功動畫彈窗 */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
            width: 90%;
        }

        .success-overlay.active .success-card {
            transform: scale(1);
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 1s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        @media (max-width: 640px) {
            .container {
                padding: 2rem 1.5rem;
            }
            .rating-group {
                gap: 0.5rem;
            }
            .emoji {
                font-size: 1.5rem;
            }
            .rating-text {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>體驗滿意度問卷</h1>
            <p>感謝您的參與！您的回饋對我們非常重要，請花一點時間告訴我們您的想法。</p>
        </div>

        <form id="surveyForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name" class="form-label">您的姓名</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="請輸入姓名" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">電子郵件</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">整體滿意度</label>
                <div class="rating-group">
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating-1" value="1" required>
                        <label for="rating-1" class="rating-label">
                            <span class="emoji">😠</span>
                            <span class="rating-text">很不滿</span>
                        </label>
                    </div>
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating-2" value="2">
                        <label for="rating-2" class="rating-label">
                            <span class="emoji">🙁</span>
                            <span class="rating-text">不滿意</span>
                        </label>
                    </div>
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating-3" value="3">
                        <label for="rating-3" class="rating-label">
                            <span class="emoji">😐</span>
                            <span class="rating-text">普通</span>
                        </label>
                    </div>
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating-4" value="4">
                        <label for="rating-4" class="rating-label">
                            <span class="emoji">🙂</span>
                            <span class="rating-text">滿意</span>
                        </label>
                    </div>
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating-5" value="5">
                        <label for="rating-5" class="rating-label">
                            <span class="emoji">😍</span>
                            <span class="rating-text">非常滿意</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="feedback" class="form-label">具體建議或意見 (選填)</label>
                <textarea id="feedback" name="feedback" class="form-control" placeholder="請告訴我們您可以改進的地方，或是您覺得最棒的部分！"></textarea>
            </div>

            <button type="submit" class="submit-btn">送出問卷</button>
        </form>
    </div>

    <!-- 成功彈窗 -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon">🎉</div>
            <h2 style="color: var(--text-main); margin-bottom: 0.5rem;">感謝您的回饋！</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.5;">我們已經收到您的問卷結果，將會持續改進以提供更好的服務。</p>
            <button class="submit-btn" onclick="closeSuccess()" style="width: auto; padding: 0.75rem 2.5rem; margin-top: 0;">關閉</button>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault(); // 阻止預設的表單送出行為
            
            // 若有後端API，可在這裡加入 AJAX / Fetch 程式碼
            // const formData = new FormData(event.target);
            // const data = Object.fromEntries(formData.entries());
            // console.log("問卷資料：", data);

            // 顯示成功動畫彈窗
            document.getElementById('successOverlay').classList.add('active');
            
            // 清空表單
            event.target.reset();
        }

        function closeSuccess() {
            document.getElementById('successOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
